name: plataforma-agendamento

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agendamento
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agendamento123}
      POSTGRES_DB: plataforma_agendamento
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agendamento']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD:-evolution123}
      POSTGRES_DB: evolution
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U evolution -d evolution']
      interval: 10s
      timeout: 5s
      retries: 5

  evolution:
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    ports:
      - '${EVOLUTION_PORT:-8080}:8080'
    environment:
      SERVER_URL: ${EVOLUTION_PUBLIC_URL:-http://localhost:${EVOLUTION_PORT:-8080}}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-evo-api-key-agendamento}
      DATABASE_ENABLED: true
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${EVOLUTION_POSTGRES_PASSWORD:-evolution123}@evolution-postgres:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: false
      DATABASE_SAVE_DATA_NEW_MESSAGE: false
      DATABASE_SAVE_MESSAGE_UPDATE: false
      DATABASE_SAVE_DATA_CONTACTS: false
      DATABASE_SAVE_DATA_CHATS: false
      STORE_POLLING: true
      WEBHOOK_HEADERS: apikey
      CORS_ORIGIN: '*'
      DEL_INSTANCE: false
      CLEAN_STORE: false
      WEBHOOK_URL: ${EVOLUTION_WEBHOOK_URL:-http://api:3000/webhook/whatsapp}
      WEBHOOK_EVENTS: 'messages.upsert'
    volumes:
      - evolution_store:/evolution/store
    depends_on:
      evolution-postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8080']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    image: ghcr.io/${IMAGE_REPOSITORY:-cezaralfredo/plataforma_agendamento}-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://agendamento:${POSTGRES_PASSWORD:-agendamento123}@postgres:5432/plataforma_agendamento
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-jwt-secret-plataforma-agendamento-2024}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:${WEB_PORT:-80}}
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-evo-api-key-agendamento}
      EVOLUTION_INSTANCE_NAME: agendamento-bot
      EVOLUTION_WEBHOOK_URL: ${EVOLUTION_WEBHOOK_URL:-http://api:3000/webhook/whatsapp}
      WHATSAPP_ADMIN_NUMBER: ${WHATSAPP_ADMIN_NUMBER:-}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_SANDBOX: ${ASAAS_SANDBOX:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  web:
    image: ghcr.io/${IMAGE_REPOSITORY:-cezaralfredo/plataforma_agendamento}-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-80}:80'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  evolution_postgres_data:
  evolution_store:
