name: plataforma-agendamento

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agendamento
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agendamento123}
      POSTGRES_DB: plataforma_agendamento
    expose:
      - 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agendamento']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agendamento-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    expose:
      - 6379
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agendamento-net

  evolution-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD:-evolution123}
      POSTGRES_DB: evolution
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U evolution -d evolution']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agendamento-net

  evolution:
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    expose:
      - 8080
    environment:
      SERVER_URL: ${EVOLUTION_PUBLIC_URL:-https://evolution.${DOMAIN:-localhost}}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-evo-api-key-agendamento}
      DATABASE_ENABLED: true
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${EVOLUTION_POSTGRES_PASSWORD:-evolution123}@evolution-postgres:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: false
      DATABASE_SAVE_DATA_NEW_MESSAGE: false
      DATABASE_SAVE_MESSAGE_UPDATE: false
      DATABASE_SAVE_DATA_CONTACTS: false
      DATABASE_SAVE_DATA_CHATS: false
      STORE_POLLING: true
      WEBHOOK_HEADERS: apikey
      CORS_ORIGIN: ${FRONTEND_URL:-https://${DOMAIN:-localhost}}
      DEL_INSTANCE: false
      CLEAN_STORE: false
      WEBHOOK_URL: 'http://api:3000/webhook/whatsapp'
      WEBHOOK_EVENTS: 'messages.upsert'
    volumes:
      - evolution_store:/evolution/store
    depends_on:
      evolution-postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8080']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - agendamento-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.evolution.rule=Host(`evolution.${DOMAIN:-localhost}`)
      - traefik.http.services.evolution.loadbalancer.server.port=8080

  api:
    image: ghcr.io/${IMAGE_REPOSITORY:-cezaralfredo/plataforma_agendamento}-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - 3000
    environment:
      DATABASE_URL: postgresql://agendamento:${POSTGRES_PASSWORD:-agendamento123}@postgres:5432/plataforma_agendamento
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL:-https://${DOMAIN:-localhost}}
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: agendamento-bot
      EVOLUTION_WEBHOOK_URL: 'http://api:3000/webhook/whatsapp/${DEFAULT_TENANT_SLUG:-demo}'
      WHATSAPP_ADMIN_NUMBER: ${WHATSAPP_ADMIN_NUMBER:-}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_API_URL: ${ASAAS_API_URL:-}
      ASAAS_SANDBOX: ${ASAAS_SANDBOX:-true}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
      SIGNUP_SECRET_KEY: ${SIGNUP_SECRET_KEY:-}
      DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-demo}
      DISABLE_TENANT_CREATION: ${DISABLE_TENANT_CREATION:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - agendamento-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.${DOMAIN:-localhost}`)
      - traefik.http.services.api.loadbalancer.server.port=3000

  web:
    image: ghcr.io/${IMAGE_REPOSITORY:-cezaralfredo/plataforma_agendamento}-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - 80
    environment:
      API_URL: https://api.${DOMAIN:-localhost}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - agendamento-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`${DOMAIN:-localhost}`)
      - traefik.http.services.web.loadbalancer.server.port=80

volumes:
  postgres_data:
  evolution_postgres_data:
  evolution_store:

networks:
  agendamento-net:
    driver: bridge
