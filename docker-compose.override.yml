services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - '3000:3000'
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
    environment:
      NODE_ENV: development


  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - '5174:5173'
    volumes:
      - ./web/src:/app/src
    environment:
      NODE_ENV: development

  postgres:
    ports:
      - '5432:5432'

  redis:
    ports:
      - '6379:6379'

  evolution:
    ports:
      - '8080:8080'
