services:
  postgres:
    image: postgres:16-alpine
    container_name: agendamento-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agendamento
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agendamento123}
      POSTGRES_DB: plataforma_agendamento
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agendamento']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: agendamento-redis
    restart: unless-stopped
    command: redis-server
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  evolution-postgres:
    image: postgres:16-alpine
    container_name: agendamento-evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD:-evolution123}
      POSTGRES_DB: evolution
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U evolution -d evolution']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  evolution:
    image: evoapicloud/evolution-api:latest
    container_name: agendamento-evolution
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-evo-api-key-agendamento}
      DATABASE_ENABLED: true
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${EVOLUTION_POSTGRES_PASSWORD:-evolution123}@evolution-postgres:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: false
      DATABASE_SAVE_DATA_NEW_MESSAGE: false
      DATABASE_SAVE_MESSAGE_UPDATE: false
      DATABASE_SAVE_DATA_CONTACTS: false
      DATABASE_SAVE_DATA_CHATS: false
      STORE_POLLING: true
      WEBHOOK_HEADERS: apikey
      CORS_ORIGIN: ${FRONTEND_URL:-http://localhost:5173}
      DEL_INSTANCE: false
      CLEAN_STORE: false
      CACHE_REDIS_ENABLED: 'true'
      CACHE_REDIS_URI: 'redis://redis:6379'
      CACHE_REDIS_PREFIX_KEY: 'evolution'
      WEBHOOK_URL: 'http://api:3000/webhook/whatsapp'
      WEBHOOK_EVENTS: 'messages.upsert'
    volumes:
      - evolution_store:/evolution/store
    depends_on:
      evolution-postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider --header="Origin: http://localhost:5173" http://localhost:8080 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - internal

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: agendamento-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://agendamento:${POSTGRES_PASSWORD:-agendamento123}@postgres:5432/plataforma_agendamento
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-jwt-secret-plataforma-agendamento-2024}
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-evo-api-key-agendamento}
      EVOLUTION_INSTANCE_NAME: agendamento-bot
      EVOLUTION_WEBHOOK_URL: 'http://api:3000/webhook/evolution/demo'
      WHATSAPP_ADMIN_NUMBER: ${WHATSAPP_ADMIN_NUMBER:-}
      PROVEDOR_MENSAGERIA_PADRAO: ${PROVEDOR_MENSAGERIA_PADRAO:-EVOLUTION}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID:-}
      META_BUSINESS_ACCOUNT_ID: ${META_BUSINESS_ACCOUNT_ID:-}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_API_URL: ${ASAAS_API_URL:-}
      ASAAS_SANDBOX: ${ASAAS_SANDBOX:-true}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
      SIGNUP_SECRET_KEY: ${SIGNUP_SECRET_KEY:-}
      DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-demo}
      DISABLE_TENANT_CREATION: ${DISABLE_TENANT_CREATION:-false}
    entrypoint: ['/app/docker-entrypoint.sh']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes: []
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - internal

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: agendamento-web
    restart: unless-stopped
    ports:
      - '5173:5173'
    depends_on:
      api:
        condition: service_started
    networks:
      - internal

networks:
  internal:
    driver: bridge
    name: agendamento_internal

volumes:
  postgres_data:
  evolution_postgres_data:
  evolution_store:
