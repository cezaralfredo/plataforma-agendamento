version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agendamento-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agendamento
      POSTGRES_PASSWORD: agendamento123
      POSTGRES_DB: plataforma_agendamento
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agendamento']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agendamento-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  evolution:
    image: evoapicloud/evolution-api:latest
    container_name: agendamento-evolution
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: evo-api-key-agendamento
      DATABASE_ENABLED: false
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://agendamento:agendamento123@postgres:5432/plataforma_agendamento
      DATABASE_SAVE_DATA_INSTANCE: false
      DATABASE_SAVE_DATA_NEW_MESSAGE: false
      DATABASE_SAVE_MESSAGE_UPDATE: false
      DATABASE_SAVE_DATA_CONTACTS: false
      DATABASE_SAVE_DATA_CHATS: false
      STORE_POLLING: true
      WEBHOOK_HEADERS: apikey
      CORS_ORIGIN: '*'
      DEL_INSTANCE: false
      CLEAN_STORE: false
      WEBHOOK_URL: 'http://api:3000/webhook/whatsapp'
      WEBHOOK_EVENTS: 'messages.upsert'
    volumes:
      - evolution_store:/evolution/store
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8080/health']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: agendamento-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://agendamento:agendamento123@postgres:5432/plataforma_agendamento
      REDIS_URL: redis://redis:6379
      JWT_SECRET: jwt-secret-plataforma-agendamento-2024
      NODE_ENV: production
      FRONTEND_URL: http://localhost:5173
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: evo-api-key-agendamento
      EVOLUTION_INSTANCE_NAME: agendamento-bot
      EVOLUTION_WEBHOOK_URL: 'http://api:3000/webhook/whatsapp'
      WHATSAPP_ADMIN_NUMBER: ''
      ASAAS_API_KEY: ''
      ASAAS_SANDBOX: 'true'
    command: >
      sh -c "
        echo '⏳ Aguardando PostgreSQL...' &&
        until nc -z postgres 5432; do sleep 2; done &&
        echo '✅ PostgreSQL disponivel!' &&
        echo '⏳ Aguardando Redis...' &&
        until nc -z redis 6379; do sleep 2; done &&
        echo '✅ Redis disponivel!' &&
        echo '📦 Sincronizando schema...' &&
        npx prisma db push --accept-data-loss &&
        echo '✅ Schema sincronizado!' &&
        echo '🌱 Executando seed...' &&
        npx tsx prisma/seed.ts &&
        echo '✅ Seed concluido!' &&
        echo '🚀 Iniciando servidor...' &&
        node dist/server.js
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evolution:
        condition: service_started
    volumes: []

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: agendamento-web
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - api

volumes:
  postgres_data:
  evolution_store:
